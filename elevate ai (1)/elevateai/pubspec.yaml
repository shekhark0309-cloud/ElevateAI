name: elevateai
description: "AI-powered Student Success Operating System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.14.0
  firebase_core: ^4.10.0
  google_fonts: ^6.3.3

  # File handling
  image_picker: ^1.1.2
  file_picker: ^8.1.0

  # Navigation & URL
  url_launcher: ^6.2.5
  go_router: ^14.0.0

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Charting (for SLG, Career screens)
  fl_chart: ^0.67.0

  # Utilities
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0              # Loading skeletons
  intl: ^0.19.0                # Date/number formatting
  share_plus: ^7.2.2           # Share portfolio link
  firebase_messaging: ^16.3.0
  sqflite: ^2.3.0
  path: ^1.9.0
  connectivity_plus: ^6.0.0

  # PDF Generation & Printing
  pdf: ^3.10.8
  printing: ^5.11.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
